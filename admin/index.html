<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FM Resumes CMS</title>
</head>
<body>
  <div id="cms-auth-message" style="display:none;max-width:680px;margin:1rem auto;padding:0.75rem 1rem;border:1px solid #dc2626;background:#fef2f2;color:#991b1b;font-family:Arial,sans-serif;font-size:0.95rem;line-height:1.45;"></div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    function showAuthMessage(message) {
      var messageBox = document.getElementById('cms-auth-message');
      if (!messageBox) return;
      messageBox.textContent = message;
      messageBox.style.display = 'block';
    }

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });

      window.netlifyIdentity.on('error', function(error) {
        var fallbackMessage = 'Authentication failed. Please verify Netlify Identity and Git Gateway are enabled for this site, then try again.';
        if (error && error.message) {
          fallbackMessage += ' Details: ' + error.message;
        }
        showAuthMessage(fallbackMessage);
      });
    } else {
      showAuthMessage('Netlify Identity failed to load. Please check your network or site configuration and refresh the page.');
    }
  </script>
</body>
</html>
