[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/updates/*"
  to = "/article.html"
  status = 200

[[redirects]]
  from = "/guides/*"
  to = "/article.html"
  status = 200
